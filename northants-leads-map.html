<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Northants Lead Hunter — MacDcreator</title>
<style>
:root{
  --bg:#0b0f17;--panel:#121826;--panel2:#1a2235;--line:#243049;
  --text:#e9eef9;--muted:#8a97b3;--accent:#7c5cff;--accent2:#22d3ee;
  --new:#3b82f6;--contacted:#f59e0b;--maybe:#ec4899;--acquired:#10b981;
  --high:#10b981;--med:#f59e0b;--low:#94a3b8;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
#app{display:grid;grid-template-columns:370px 1fr;height:100vh}

/* ── SIDEBAR ── */
#sidebar{background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden}
#hdr{padding:16px 16px 12px;border-bottom:1px solid var(--line)}
#hdr h1{font-size:17px;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:3px}
#hdr .sub{font-size:11px;color:var(--muted)}
#stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:12px 14px;border-bottom:1px solid var(--line)}
.stat{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:7px 4px;text-align:center}
.stat .n{font-size:17px;font-weight:700}.stat .l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
.stat.s-new .n{color:var(--new)}.stat.s-contacted .n{color:var(--contacted)}
.stat.s-maybe .n{color:var(--maybe)}.stat.s-acquired .n{color:var(--acquired)}
#prog-wrap{padding:10px 14px;border-bottom:1px solid var(--line)}
#prog-lbl{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
#prog-bar{height:8px;background:var(--panel2);border-radius:6px;overflow:hidden;border:1px solid var(--line)}
#prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--acquired));width:0%;transition:width .6s}
#filters{padding:10px 14px;border-bottom:1px solid var(--line);display:flex;flex-wrap:wrap;gap:5px}
.chip{font-size:10px;padding:4px 9px;border-radius:999px;border:1px solid var(--line);background:var(--panel2);color:var(--muted);cursor:pointer;user-select:none;transition:all .15s}
.chip:hover{color:var(--text);border-color:var(--accent)}.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
#search-wrap{padding:8px 14px;border-bottom:1px solid var(--line)}
#search{width:100%;padding:8px 10px;background:var(--panel2);border:1px solid var(--line);border-radius:7px;color:var(--text);font-size:12px;outline:none}
#search:focus{border-color:var(--accent)}
#lead-list{flex:1;overflow-y:auto;padding:6px 8px}
#lead-list::-webkit-scrollbar{width:6px}
#lead-list::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}
.lead{padding:9px 11px;margin:4px 0;background:var(--panel2);border:1px solid var(--line);border-left:3px solid var(--new);border-radius:7px;cursor:pointer;transition:all .15s}
.lead:hover{border-color:var(--accent);transform:translateX(2px)}
.lead.st-contacted{border-left-color:var(--contacted)}.lead.st-maybe{border-left-color:var(--maybe)}
.lead.st-acquired{border-left-color:var(--acquired);opacity:.55}
.lead .nm{font-weight:600;font-size:12px;display:flex;justify-content:space-between;align-items:center}
.lead .mt{font-size:10px;color:var(--muted);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap}
.badge{font-size:9px;padding:2px 5px;border-radius:3px;font-weight:700;background:var(--panel);text-transform:uppercase;letter-spacing:.4px}
.badge.HIGH{color:var(--high);border:1px solid var(--high)}.badge.MEDIUM{color:var(--med);border:1px solid var(--med)}.badge.LOW{color:var(--low);border:1px solid var(--low)}
#foot{padding:9px 14px;border-top:1px solid var(--line);font-size:10px;color:var(--muted);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
#reset-btn{background:none;border:1px solid var(--line);color:var(--muted);padding:3px 8px;border-radius:5px;font-size:10px;cursor:pointer;margin-left:auto}
#reset-btn:hover{color:#ff6b6b;border-color:#ff6b6b}

/* ── MAP ── */
#map-wrap{position:relative;overflow:hidden;background:#0d1117}
#map-canvas{display:block;cursor:grab}
#map-canvas.dragging{cursor:grabbing}

/* ── POPUP ── */
#popup{position:absolute;display:none;min-width:290px;max-width:330px;background:var(--panel);border:1px solid var(--line);border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,.6);z-index:10;padding:14px 16px;font-size:12px}
#popup-close{position:absolute;top:10px;right:12px;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1}
#popup-close:hover{color:var(--text)}
#popup h3{font-size:14px;margin-bottom:2px;padding-right:20px}
#popup .cat{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.pr{display:flex;justify-content:space-between;padding:3px 0;border-top:1px dashed var(--line);gap:8px}
.pr .k{color:var(--muted);white-space:nowrap}.pr .v{text-align:right;font-size:11px}
.pr a{color:var(--accent2);text-decoration:none}.pr a:hover{text-decoration:underline}
#popup .pitch{margin-top:9px;padding:8px 10px;background:var(--panel2);border-left:2px solid var(--accent);border-radius:5px;font-size:11px;line-height:1.5;color:#cbd5e1;font-style:italic}
#popup .acts{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:10px}
#popup .acts button{background:var(--panel2);border:1px solid var(--line);color:var(--text);padding:6px;border-radius:5px;font-size:10px;font-weight:700;cursor:pointer;transition:all .12s}
#popup .acts button:hover{border-color:var(--accent)}
#popup .acts button.on-new{background:var(--new);border-color:var(--new)}
#popup .acts button.on-contacted{background:var(--contacted);border-color:var(--contacted);color:#111}
#popup .acts button.on-maybe{background:var(--maybe);border-color:var(--maybe)}
#popup .acts button.on-acquired{background:var(--acquired);border-color:var(--acquired)}
#attrib{position:absolute;bottom:4px;right:6px;font-size:9px;color:rgba(255,255,255,.35);z-index:5;pointer-events:none}
</style>
</head>

/* ── STATE ── */
const SK="northants-v2";
let state={};
try{state=JSON.parse(localStorage.getItem(SK))||{};}catch(e){}
LEADS.forEach(l=>{if(!state[l.id])state[l.id]={status:"new"};});
function save(){localStorage.setItem(SK,JSON.stringify(state));}

/* ── MAP ENGINE ── */
const D2R=Math.PI/180,R2D=180/Math.PI,TILE=256;
function ll2w(lat,lng,z){const s=Math.pow(2,z);return{x:(lng+180)/360*s*TILE,y:(0.5-Math.log((1+Math.sin(lat*D2R))/(1-Math.sin(lat*D2R)))/(4*Math.PI))*s*TILE};}
function w2ll(wx,wy,z){const s=Math.pow(2,z);return{lat:Math.atan(Math.sinh(Math.PI-2*Math.PI*wy/(s*TILE)))*R2D,lng:wx/(s*TILE)*360-180};}

const canvas=document.getElementById("map-canvas");
const wrap=document.getElementById("map-wrap");
const ctx=canvas.getContext("2d");
let vLat=52.28,vLng=-0.82,zoom=10,activeLead=null;
const cache={},hits=[];

function tileUrl(tx,ty,tz){const s=["a","b","c"][Math.abs(tx+ty)%3];const n=Math.pow(2,tz);const ntx=((tx%n)+n)%n;return`https://${s}.tile.openstreetmap.org/${tz}/${ntx}/${ty}.png`;}
function getTile(url){if(cache[url])return cache[url];const i=new Image();i.crossOrigin="anonymous";i.onload=()=>{i._ok=true;draw();};i.src=url;return cache[url]=i;}

function draw(){
  const W=canvas.width,H=canvas.height;
  ctx.fillStyle="#1a1a2e";ctx.fillRect(0,0,W,H);
  const iz=Math.round(zoom),sc=Math.pow(2,zoom-iz),ts=TILE*sc;
  const c=ll2w(vLat,vLng,iz);
  const ox=c.x*sc-W/2,oy=c.y*sc-H/2;
  for(let tx=Math.floor(ox/ts);tx<=Math.ceil((ox+W)/ts);tx++){
    for(let ty=Math.floor(oy/ts);ty<=Math.ceil((oy+H)/ts);ty++){
      if(ty<0||ty>=Math.pow(2,iz))continue;
      const img=getTile(tileUrl(tx,ty,iz));
      const px=tx*ts-ox,py=ty*ts-oy;
      if(img._ok)ctx.drawImage(img,px,py,ts,ts);
      else{ctx.fillStyle="#1e2a3a";ctx.fillRect(px,py,ts-1,ts-1);}
    }
  }
  hits.length=0;
  LEADS.forEach(l=>{
    const w=ll2w(l.lat,l.lng,iz);
    const px=w.x*sc-ox,py=w.y*sc-oy;
    if(px<-30||px>W+30||py<-30||py>H+30)return;
    drawPin(px,py,l);hits.push({id:l.id,px,py});
  });
}

const SC={new:"#3b82f6",contacted:"#f59e0b",maybe:"#ec4899",acquired:"#10b981"};
function drawPin(x,y,l){
  const col=SC[state[l.id].status]||"#3b82f6";
  const al=state[l.id].status==="acquired"?.4:1;
  const isAct=activeLead&&activeLead.id===l.id;
  const r=isAct?14:11;
  ctx.save();ctx.globalAlpha=al;
  ctx.shadowColor="rgba(0,0,0,.7)";ctx.shadowBlur=10;ctx.shadowOffsetY=4;
  ctx.beginPath();ctx.arc(x,y-r-3,r,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();
  ctx.strokeStyle="#fff";ctx.lineWidth=2;ctx.stroke();
  ctx.beginPath();ctx.moveTo(x-5,y-r+1);ctx.lineTo(x,y+5);ctx.lineTo(x+5,y-r+1);ctx.fillStyle=col;ctx.fill();
  ctx.shadowBlur=0;
  ctx.beginPath();ctx.arc(x,y-r-3,r*.38,0,Math.PI*2);ctx.fillStyle="rgba(255,255,255,.9)";ctx.fill();
  if(l.score==="HIGH"){
    ctx.beginPath();ctx.arc(x+r,y-2*r-2,5,0,Math.PI*2);
    ctx.fillStyle="#fbbf24";ctx.fill();ctx.strokeStyle="#fff";ctx.lineWidth=1;ctx.stroke();
  }
  ctx.restore();
}

function resize(){canvas.width=wrap.clientWidth;canvas.height=wrap.clientHeight;draw();}
window.addEventListener("resize",resize);resize();

/* ── PAN ── */
let drag=false,lx=0,ly=0;
canvas.addEventListener("mousedown",e=>{if(e.button)return;drag=true;lx=e.clientX;ly=e.clientY;canvas.classList.add("dragging");});
window.addEventListener("mousemove",e=>{
  if(!drag)return;
  const iz=Math.round(zoom),sc=Math.pow(2,zoom-iz);
  const c=ll2w(vLat,vLng,iz);
  const nl=w2ll((c.x*sc-(e.clientX-lx))/sc,(c.y*sc-(e.clientY-ly))/sc,iz);
  vLat=Math.max(-85,Math.min(85,nl.lat));vLng=nl.lng;lx=e.clientX;ly=e.clientY;draw();hidePopup();
});
window.addEventListener("mouseup",()=>{drag=false;canvas.classList.remove("dragging");});

/* ── TOUCH ── */
let lt=null;
canvas.addEventListener("touchstart",e=>{lt=e.touches[0];e.preventDefault();},{passive:false});
canvas.addEventListener("touchmove",e=>{
  if(!lt)return;const t=e.touches[0];
  const iz=Math.round(zoom),sc=Math.pow(2,zoom-iz);
  const c=ll2w(vLat,vLng,iz);
  const nl=w2ll((c.x*sc-(t.clientX-lt.clientX))/sc,(c.y*sc-(t.clientY-lt.clientY))/sc,iz);
  vLat=Math.max(-85,Math.min(85,nl.lat));vLng=nl.lng;lt=t;draw();hidePopup();
  e.preventDefault();
},{passive:false});
canvas.addEventListener("touchend",()=>{lt=null;});

/* ── ZOOM ── */
canvas.addEventListener("wheel",e=>{e.preventDefault();zoom=Math.max(8,Math.min(18,zoom+(e.deltaY>0?-.35:.35)));draw();hidePopup();},{passive:false});

/* ── CLICK ── */
canvas.addEventListener("click",e=>{
  const r=canvas.getBoundingClientRect(),cx=e.clientX-r.left,cy=e.clientY-r.top;
  let hit=null,best=999;
  hits.forEach(h=>{const d=Math.hypot(cx-h.px,cy-h.py-13);if(d<24&&d<best){best=d;hit=h;}});
  if(hit){activeLead=LEADS.find(l=>l.id===hit.id);draw();showPopup(activeLead,hit.px,hit.py);}
  else{activeLead=null;draw();hidePopup();}
});

/* ── POPUP ── */
const popup=document.getElementById("popup");
function showPopup(l,px,py){
  document.getElementById("pop-name").textContent=l.name;
  const sc=l.score==="HIGH"?"#10b981":l.score==="MEDIUM"?"#f59e0b":"#94a3b8";
  document.getElementById("pop-cat").innerHTML=`${l.cat} · ${l.town} · <span style="color:${sc};font-weight:700">${l.score}</span>`;
  const ws=l.web==="None"?`<span style="color:#ec4899">None</span>`:`<a href="https://${l.web}" target="_blank">${l.web}</a>`;
  const ig=`<a href="https://instagram.com/${l.ig.replace("@","")}" target="_blank">${l.ig}</a>`;
  document.getElementById("pop-rows").innerHTML=`
    <div class="pr"><span class="k">Rating</span><span class="v">★ ${l.rating} (${l.reviews})</span></div>
    <div class="pr"><span class="k">Address</span><span class="v">${l.addr}</span></div>
    <div class="pr"><span class="k">Website</span><span class="v">${ws}</span></div>
    <div class="pr"><span class="k">Site notes</span><span class="v">${l.webNote}</span></div>
    <div class="pr"><span class="k">Instagram</span><span class="v">${ig} · ${l.followers.toLocaleString()}</span></div>
    <div class="pr"><span class="k">Contact</span><span class="v">${l.contact}</span></div>`;
  document.getElementById("pop-pitch").textContent=l.pitch;
  updateBtns(l.id);
  popup.style.display="block";
  const W=canvas.width,H=canvas.height,pw=popup.offsetWidth||320,ph=popup.offsetHeight||380;
  let left=px+20,top=py-ph/2;
  if(left+pw>W-10)left=px-pw-20;
  top=Math.max(10,Math.min(top,H-ph-10));
  popup.style.left=left+"px";popup.style.top=top+"px";
}
function hidePopup(){popup.style.display="none";}
function updateBtns(id){
  const st=state[id].status;
  popup.querySelectorAll(".acts button").forEach(b=>{b.className=b.dataset.s===st?"on-"+st:"";});
}
document.getElementById("popup-close").onclick=()=>{activeLead=null;hidePopup();draw();};
popup.querySelectorAll(".acts button").forEach(b=>{
  b.onclick=()=>{
    if(!activeLead)return;
    state[activeLead.id].status=b.dataset.s;
    save();updateBtns(activeLead.id);draw();renderSidebar();
  };
});

/* ── SIDEBAR ── */
const cats=[...new Set(LEADS.map(l=>l.cat))];
let activeFilter="ALL",searchQ="";
function renderFilters(){
  const f=document.getElementById("filters");f.innerHTML="";
  ["ALL",...cats].forEach(c=>{
    const el=document.createElement("div");el.className="chip"+(activeFilter===c?" active":"");
    el.textContent=c==="ALL"?`All (${LEADS.length})`:c;
    el.onclick=()=>{activeFilter=c;renderFilters();renderList();};
    f.appendChild(el);
  });
}
function renderList(){
  const list=document.getElementById("lead-list");list.innerHTML="";
  const ord={HIGH:0,MEDIUM:1,LOW:2};
  LEADS.filter(l=>(activeFilter==="ALL"||l.cat===activeFilter)&&(!searchQ||(l.name+l.town+l.cat).toLowerCase().includes(searchQ.toLowerCase())))
    .sort((a,b)=>ord[a.score]-ord[b.score])
    .forEach(l=>{
      const st=state[l.id].status;
      const el=document.createElement("div");el.className=`lead st-${st}`;
      el.innerHTML=`<div class="nm">${l.name}<span class="badge ${l.score}">${l.score}</span></div><div class="mt"><span>${l.cat}</span><span>${l.town}</span><span>★ ${l.rating}</span><span>IG ${l.followers.toLocaleString()}</span></div>`;
      el.onclick=()=>{
        zoom=14;vLat=l.lat;vLng=l.lng;activeLead=l;draw();
        setTimeout(()=>{const h=hits.find(h=>h.id===l.id);if(h)showPopup(l,h.px,h.py);},80);
      };
      list.appendChild(el);
    });
}
function renderStats(){
  const c={new:0,contacted:0,maybe:0,acquired:0};
  LEADS.forEach(l=>c[state[l.id].status]++);
  ["new","contacted","maybe","acquired"].forEach(k=>document.getElementById("cnt-"+k).textContent=c[k]);
  const pct=Math.round(100*c.acquired/LEADS.length);
  document.getElementById("prog-fill").style.width=pct+"%";
  document.getElementById("prog-pct").textContent=pct+"%";
}
function renderSidebar(){renderFilters();renderList();renderStats();}

document.getElementById("search").oninput=e=>{searchQ=e.target.value;renderList();};
document.getElementById("reset-btn").onclick=()=>{
  if(!confirm("Reset all status to New?"))return;
  LEADS.forEach(l=>state[l.id]={status:"new"});save();activeLead=null;draw();renderSidebar();
};
renderSidebar();
</script>
</body>
</html>
